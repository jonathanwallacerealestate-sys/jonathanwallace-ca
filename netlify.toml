# Netlify configuration — jonathanwallace.ca
# Static site: no build step, publish the repo root.

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# Pretty URLs / basic hardening headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache the latest-videos API at the edge (refresh hourly, serve stale meanwhile)
[[headers]]
  for = "/.netlify/functions/latest-videos"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# Cache the Google reviews API at the edge (refresh daily, serve stale meanwhile)
[[headers]]
  for = "/.netlify/functions/google-reviews"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

# Example redirect (uncomment + edit if you add /listings via an IDX subdomain)
# [[redirects]]
#   from = "/listings"
